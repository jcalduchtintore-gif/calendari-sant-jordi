<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendari de Sant Jordi 🌹📖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600;1,700&family=IM+Fell+English+SC&display=swap" rel="stylesheet">

  <style>
    /* ================================================================
       VARIABLES & RESET
    ================================================================ */
    :root {
      --cream:          #F8F0DC;
      --cream-warm:     #F2E5C0;
      --parchment:      #EAD9A4;
      --parchment-dark: #C9B060;
      --crimson:        #8B1A1A;
      --crimson-light:  #A52525;
      --rose:           #C94B6E;
      --rose-light:     #EBB0BC;
      --rose-pale:      #FFF0F3;
      --gold:           #B5870A;
      --gold-light:     #D4A820;
      --gold-shine:     #F2CE50;
      --dark:           #1C0C06;
      --dark-mid:       #3A2010;
      --text:           #2A1808;
      --text-mid:       #5C3820;
      --locked-bg:      #C8B89A;
      --locked-text:    #8A7A68;
      --shadow:         rgba(28, 12, 6, 0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background-color: var(--cream);
      background-image:
        radial-gradient(ellipse at 15% 0%,  rgba(139, 26, 26, 0.10) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 100%, rgba(201, 75, 110, 0.08) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%,  rgba(181,135, 10, 0.04) 0%, transparent 70%);
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--text);
      overflow-x: hidden;
    }

    /* ================================================================
       SURVEY — Pantalla pregunta prèvia
    ================================================================ */
    .encuesta-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      background-color: var(--cream);
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(139, 26, 26, 0.13) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 90%, rgba(201, 75, 110, 0.10) 0%, transparent 55%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
      transition: opacity 0.7s ease;
    }

    .encuesta-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .encuesta-dragon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      animation: float 4s ease-in-out infinite;
      filter: drop-shadow(0 4px 12px rgba(139, 26, 26, 0.3));
      user-select: none;
      display: block;
    }

    .encuesta-nom {
      font-family: 'IM Fell English SC', serif;
      font-size: clamp(0.9rem, 3vw, 1.35rem);
      color: var(--gold);
      letter-spacing: 0.3em;
      margin-bottom: 0.9rem;
      display: block;
    }

    .encuesta-pregunta {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.3rem, 4vw, 2.5rem);
      font-weight: 700;
      color: var(--crimson);
      line-height: 1.35;
      max-width: 680px;
      text-shadow: 2px 2px 0 rgba(181,135,10,0.2);
    }

    .encuesta-pregunta.shake {
      animation: shake 0.55s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-14px) rotate(-1.2deg); }
      40%       { transform: translateX( 11px) rotate( 1deg); }
      60%       { transform: translateX(-8px)  rotate(-0.6deg); }
      80%       { transform: translateX(  6px) rotate( 0.4deg); }
    }

    .encuesta-ornament {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      max-width: 380px;
      width: 100%;
      margin: 1.5rem auto;
    }

    .encuesta-ornament::before,
    .encuesta-ornament::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--parchment-dark), transparent);
    }

    .encuesta-ornament span {
      color: var(--crimson);
      font-size: 0.85rem;
      letter-spacing: 0.45em;
      user-select: none;
    }

    .encuesta-bottons {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-si,
    .btn-no {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 0.9rem 2.75rem;
      border-radius: 8px;
      border: 2px solid;
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.25s ease,
                  background 0.2s ease;
    }

    .btn-si {
      background: var(--crimson);
      color: var(--cream);
      border-color: var(--crimson-light);
      box-shadow: 0 4px 18px rgba(139, 26, 26, 0.38);
    }

    .btn-si:hover {
      background: var(--crimson-light);
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 10px 28px rgba(139, 26, 26, 0.48);
    }

    .btn-no {
      background: transparent;
      color: var(--locked-text);
      border-color: var(--locked-bg);
    }

    .btn-no:hover {
      background: var(--locked-bg);
      color: var(--dark-mid);
      transform: translateY(-2px);
    }

    .encuesta-error {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-style: italic;
      color: var(--rose);
      margin-top: 1.4rem;
      min-height: 1.8rem;
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .encuesta-error.visible {
      opacity: 1;
    }

    /* ================================================================
       HEADER
    ================================================================ */
    .header {
      text-align: center;
      padding: 3.5rem 1.5rem 1.5rem;
    }

    .header-crown {
      font-size: 2.4rem;
      display: block;
      margin-bottom: 1rem;
      animation: float 4s ease-in-out infinite;
      filter: drop-shadow(0 4px 10px rgba(139, 26, 26, 0.3));
      user-select: none;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }

    .header h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.5rem, 5vw, 3rem);
      font-weight: 700;
      color: var(--crimson);
      letter-spacing: 0.04em;
      line-height: 1.15;
      margin-bottom: 0.6rem;
      text-shadow: 3px 3px 0 rgba(181,135,10,0.25), 0 0 40px rgba(139,26,26,0.1);
    }

    .header h1 em {
      font-style: normal;
      color: var(--gold);
    }

    .header-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      font-style: italic;
      color: var(--text-mid);
      letter-spacing: 0.08em;
      margin-bottom: 0.6rem;
    }

    .header-date {
      font-family: 'IM Fell English SC', serif;
      font-size: 0.82rem;
      color: var(--gold);
      letter-spacing: 0.25em;
    }

    .ornament-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      max-width: 480px;
      margin: 1.4rem auto;
    }

    .ornament-line::before,
    .ornament-line::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--parchment-dark), var(--gold-light), var(--parchment-dark), transparent);
    }

    .ornament-line span {
      color: var(--crimson);
      font-size: 0.9rem;
      letter-spacing: 0.5em;
      user-select: none;
    }

    /* ================================================================
       CALENDAR GRID
    ================================================================ */
    .calendar-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.25rem 4rem;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.85rem;
    }

    @media (min-width: 480px) {
      .calendar-grid { grid-template-columns: repeat(4, 1fr); }
    }

    @media (min-width: 640px) {
      .calendar-grid { grid-template-columns: repeat(5, 1fr); gap: 1rem; }
    }

    @media (min-width: 900px) {
      .calendar-grid { grid-template-columns: repeat(6, 1fr); gap: 1.2rem; }
    }

    /* ================================================================
       CARDS — BASE
    ================================================================ */
    .card {
      position: relative;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.3s ease;
      animation: cardIn 0.55s ease backwards;
      outline: none;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.88); }
      to   { opacity: 1; transform: translateY(0)   scale(1);     }
    }

    .card:focus-visible {
      box-shadow: 0 0 0 3px var(--rose-light);
    }

    .card-face {
      border-radius: 9px;
      aspect-ratio: 3 / 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 0.5rem;
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.3s ease;
    }

    .card-face::before,
    .card-face::after {
      content: '◆';
      position: absolute;
      font-size: 0.35rem;
      opacity: 0.35;
    }
    .card-face::before { top:    0.45rem; left:  0.45rem; }
    .card-face::after  { bottom: 0.45rem; right: 0.45rem; }

    .card-number {
      font-family: 'IM Fell English SC', serif;
      font-size: clamp(1.6rem, 2.8vw, 2.5rem);
      line-height: 1;
      display: block;
      margin-bottom: 0.35rem;
    }

    .card-icon {
      font-size: clamp(1rem, 1.8vw, 1.3rem);
      display: block;
      margin-bottom: 0.2rem;
      user-select: none;
    }

    .card-label {
      font-size: clamp(0.55rem, 1vw, 0.68rem);
      letter-spacing: 0.12em;
      text-align: center;
      font-style: italic;
      display: block;
    }

    /* ================================================================
       CARD — LOCKED
    ================================================================ */
    .card.locked { cursor: not-allowed; }

    .card.locked .card-face {
      background: var(--locked-bg);
      background-image:
        repeating-linear-gradient(
          45deg,
          rgba(255,255,255,0.13) 0px, rgba(255,255,255,0.13) 1px,
          transparent 1px, transparent 10px
        );
      border: 2px solid rgba(138, 122, 104, 0.35);
    }

    .card.locked:hover { transform: translateY(-2px); }
    .card.locked .card-number { color: var(--locked-text); }
    .card.locked .card-icon   { opacity: 0.55; }
    .card.locked .card-label  { color: var(--locked-text); opacity: 0.75; }

    /* ================================================================
       CARD — UNLOCKED
    ================================================================ */
    .card.unlocked .card-face {
      background: linear-gradient(135deg, #FFFEF9 0%, var(--cream-warm) 100%);
      border: 2px solid var(--parchment-dark);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.85),
        inset 0 0 22px rgba(181,135,10,0.08);
    }

    .card.unlocked:hover {
      transform: translateY(-7px) rotate(0.9deg);
      box-shadow: 0 16px 38px var(--shadow);
    }

    .card.unlocked .card-face::before,
    .card.unlocked .card-face::after { color: var(--gold-light); opacity: 0.7; }

    .card.unlocked .card-number {
      color: var(--crimson);
      text-shadow: 1px 1px 0 rgba(181,135,10,0.2);
    }
    .card.unlocked .card-label { color: var(--text-mid); }

    /* ================================================================
       CARD — VISITED
    ================================================================ */
    .card.visited .card-face {
      background: linear-gradient(135deg, #FFF8F9 0%, #FFE5EA 100%);
      border: 2px solid var(--rose-light);
      box-shadow: inset 0 0 22px rgba(201,75,110,0.07);
    }

    .card.visited:hover {
      transform: translateY(-7px) rotate(-0.9deg);
      box-shadow: 0 16px 38px rgba(201,75,110,0.22);
    }

    .card.visited .card-number { color: var(--rose); }
    .card.visited .card-label  { color: var(--rose); }

    .card.visited::after {
      content: '🌹';
      position: absolute;
      top: 0.32rem;
      right: 0.32rem;
      font-size: 0.72rem;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
      pointer-events: none;
    }

    /* ================================================================
       CARD — DAY 23 SPECIAL
    ================================================================ */
    @media (min-width: 900px) {
      .card.day-23 { grid-column: span 2; }
      .card.day-23 .card-face { aspect-ratio: auto; min-height: 135px; }
      .card.day-23 .card-number { font-size: 3.5rem; }
      .card.day-23 .card-label  { font-size: 0.8rem; letter-spacing: 0.2em; }
    }

    .card.day-23.unlocked .card-face {
      background: linear-gradient(135deg, #FFFCEE 0%, #FFE9BC 45%, #FFF4EA 100%);
      border: 2px solid var(--gold);
      box-shadow:
        inset 0 0 30px rgba(181,135,10,0.14),
        0 0 0 3px rgba(181,135,10,0.18);
    }

    .card.day-23.unlocked { animation: cardIn 0.55s ease backwards, day23Glow 2.2s ease-in-out 0.6s infinite; }

    @keyframes day23Glow {
      0%, 100% { box-shadow: 0 0 0 0   rgba(181,135,10,0.5); }
      50%       { box-shadow: 0 0 0 10px rgba(181,135,10,0); }
    }

    .card.day-23.unlocked .card-number { color: var(--gold); }
    .card.day-23.unlocked .card-label  { color: var(--crimson); font-style: normal; font-weight: 600; }

    .card.day-23.visited .card-face {
      background: linear-gradient(135deg, #FFFCEE 0%, #FFE9BC 45%, #FFF4EA 100%);
      border: 2px solid var(--gold);
    }
    .card.day-23.visited .card-number { color: var(--gold); }

    /* ================================================================
       MODAL
    ================================================================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(18, 8, 4, 0.9);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--cream);
      border-radius: 14px;
      max-width: 560px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--parchment-dark) transparent;
      position: relative;
      border: 2px solid var(--gold);
      box-shadow:
        0 0 0 5px  rgba(181,135,10,0.15),
        0 0 0 10px rgba(139, 26, 26, 0.08),
        0 40px 100px rgba(0,0,0,0.55);
      transform: scale(0.88) translateY(26px);
      transition: transform 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .modal-overlay.active .modal {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      background: linear-gradient(135deg, var(--crimson) 0%, var(--dark-mid) 100%);
      padding: 1.5rem 3rem 1.5rem 1.5rem;
      text-align: center;
      border-radius: 12px 12px 0 0;
      position: relative;
    }

    .modal-header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 2px;
      background: var(--gold-light);
    }

    .modal-sup {
      font-family: 'Cinzel Decorative', serif;
      color: var(--gold-light);
      font-size: 0.68rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      opacity: 0.9;
      display: block;
      margin-bottom: 0.3rem;
    }

    .modal-number {
      font-family: 'IM Fell English SC', serif;
      color: var(--cream);
      font-size: 2.8rem;
      line-height: 1;
      display: block;
    }

    .modal-close {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.28);
      color: var(--cream);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.25s;
      flex-shrink: 0;
    }

    .modal-close:hover {
      background: rgba(255,255,255,0.26);
      transform: rotate(90deg);
    }

    .modal-image {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
    }

    .modal-body {
      padding: 1.75rem 2.25rem 2.25rem;
    }

    .modal-ornament {
      text-align: center;
      color: var(--gold-light);
      letter-spacing: 0.65em;
      font-size: 0.78rem;
      margin: 0.75rem 0 1.25rem;
      display: block;
    }

    .modal-poem {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.05rem, 2.5vw, 1.25rem);
      font-style: italic;
      color: var(--text);
      line-height: 1.9;
      text-align: center;
      white-space: pre-wrap;
    }

    .modal-rose {
      display: block;
      text-align: center;
      font-size: 1.8rem;
      margin-top: 1.5rem;
      animation: roseSwing 3.5s ease-in-out infinite;
    }

    @keyframes roseSwing {
      0%, 100% { transform: rotate(-6deg) translateY(0); }
      50%       { transform: rotate( 6deg) translateY(-5px); }
    }

    /* ================================================================
       TOAST
    ================================================================ */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(130px);
      background: var(--dark);
      color: var(--cream);
      padding: 0.9rem 1.75rem;
      border-radius: 10px;
      border: 1px solid rgba(139,26,26,0.5);
      border-left: 4px solid var(--crimson);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-style: italic;
      line-height: 1.55;
      z-index: 2000;
      transition: transform 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      max-width: min(90vw, 400px);
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.42);
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ================================================================
       FOOTER
    ================================================================ */
    .footer {
      text-align: center;
      padding: 1.75rem 1.5rem;
      border-top: 1px solid var(--parchment-dark);
      color: var(--text-mid);
      font-size: 0.92rem;
      font-style: italic;
      letter-spacing: 0.05em;
    }

    /* ================================================================
       SCROLLBAR
    ================================================================ */
    ::-webkit-scrollbar { width: 7px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--parchment-dark); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold-light); }

    @media (max-width: 480px) {
      .modal-body { padding: 1.25rem 1.5rem 1.75rem; }
      .modal-number { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

<!-- ================================================================
     SURVEY — Pantalla pregunta prèvia
================================================================ -->
<div id="encuesta" class="encuesta-overlay" role="dialog" aria-modal="true" aria-labelledby="enc-pregunta">
  <span class="encuesta-dragon" aria-hidden="true">🐉 🌹</span>
  <span class="encuesta-nom">Anna Albert Llorens</span>
  <h2 class="encuesta-pregunta" id="enc-pregunta">
    vols passar Sant Jordi<br>al meu costat?
  </h2>
  <div class="encuesta-ornament" aria-hidden="true"><span>✦ ✦ ✦</span></div>
  <div class="encuesta-bottons">
    <button class="btn-si" id="btn-si">Sí 🌹</button>
    <button class="btn-no" id="btn-no">No</button>
  </div>
  <p class="encuesta-error" id="encuesta-error" role="alert" aria-live="polite">
    Resposta incorrecta! Torna-ho a intentar... 😏
  </p>
</div>

<!-- ================================================================
     HEADER
================================================================ -->
<header class="header">
  <span class="header-crown" aria-hidden="true">🐉 🌹 📖</span>
  <h1>Calendari de <em>Sant Jordi</em></h1>
  <p class="header-subtitle">Una petita sorpresa cada dia fins al 23 d'abril</p>
  <p class="header-date" id="header-date"></p>
  <div class="ornament-line" aria-hidden="true"><span>✦ ✦ ✦</span></div>
</header>

<!-- ================================================================
     CALENDAR GRID
================================================================ -->
<main class="calendar-container">
  <div class="calendar-grid" id="calendar-grid" role="list" aria-label="Calendari de Sant Jordi">
    <!-- Cards generated by JavaScript -->
  </div>
</main>

<!-- ================================================================
     MODAL
================================================================ -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-number">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-sup">Dia d'Abril</span>
      <span class="modal-number" id="modal-number">1</span>
      <button class="modal-close" id="modal-close" aria-label="Tancar la finestra">✕</button>
    </div>
    <img id="modal-image" class="modal-image" src="" alt="" />
    <div class="modal-body">
      <span class="modal-ornament" aria-hidden="true">✦ ✦ ✦</span>
      <p class="modal-poem" id="modal-poem"></p>
      <span class="modal-rose" aria-hidden="true">🌹</span>
    </div>
  </div>
</div>

<!-- TOAST (missatge per dies bloquejats) -->
<div class="toast" id="toast" role="alert" aria-live="assertive"></div>

<!-- ================================================================
     FOOTER
================================================================ -->
<footer class="footer">
  De part del teu estimat marit Jordi Calduch Tintoré 🌹

<script>
  /* ================================================================
     ▼▼▼  EDITA AQUÍ TUS POEMAS E IMÁGENES  ▼▼▼
     ================================================================
     Cada elemento tiene:
       • dia       → número del día (1 al 23)
       • imagenURL → URL de tu imagen (sustituye "" por el link de
                     Google Drive, Imgur, etc. — déjalo vacío si no
                     quieres imagen en ese día)
       • poema     → texto del poema (\n = salto de línea)
     ================================================================ */
  const datosCalendario = [
    {
      dia: 1,
      imagenURL: "",
      poema: `Recordo com si fos ahir\nel primer petó que em vas fer,\nsi sabessis que tan extasiat\nhe estat des de llavors.`
    },
    {
      dia: 2,
      imagenURL: "",
      poema: `Encara em deus un cacaolat...\nEl 23 podries complir el que\nvas prometre'm.`
    },
    {
      dia: 3,
      imagenURL: "",
      poema: `La Pedrera, la Sagrada Família,\nnomés imaginar-me caminant al teu\ncostat em fa feliç.`
    },
    {
      dia: 4,
      imagenURL: "",
      poema: `El 23 serà igual de especial\nque qualsevol somriure teu.`
    },
    {
      dia: 5,
      imagenURL: "",
      poema: `Espero que segueixis intrigada\nperquè ara algun pla potser\nse m'escapa (jijijijij)`
    },
    {
      dia: 6,
      imagenURL: "",
      poema: `Hem de fer tradició,\nla nostra tradició,\naixí que l'esmorzar ja et pots imaginar.`
    },
    {
      dia: 7,
      imagenURL: "",
      poema: `Els carrers estaran plens de paradetes\nde roses, qui sap, potser alguna és per tu...`
    },
    {
      dia: 8,
      imagenURL: "",
      poema: `Pista! Una cara preciosa i coneguda\nque de vermell trobarem, serà segur alguna cosa que visitarem.`
    },
    {
      dia: 9,
      imagenURL: "",
      poema: `Sort que vaig ser valent\n(o penós segons qui) per dir-te: "Bon Nadal!",\nperquè sinó tot això m'ho perdria.`
    },
    {
      dia: 10,
      imagenURL: "",
      poema: `Ja queda menys, per poder presumir...\nEspero que sàpigues on em convidaràs...`
    },
    {
      dia: 11,
      imagenURL: "",
      poema: `El d'ahir era broma,\njo m'encarrego de tot,\ntu fes allò que saps fer tant bé,\nfer-me feliç.`
    },
    {
      dia: 12,
      imagenURL: "",
      poema: `Entrades ja tenim...\nPERÒ! Envia un WhatsApp immediat.\nI concretarem on anar.`
    },
    {
      dia: 13,
      imagenURL: "",
      poema: `Segura segura que vols\npassar el dia amb mi?`
    },
    {
      dia: 14,
      imagenURL: "",
      poema: `Em pregunto quantes roses\nsón suficients.`
    },
    {
      dia: 15,
      imagenURL: "",
      poema: `Em pregunto com deu ser\nel Sant Jordi a Isona.\nAlgun any ho descobriré al teu costat.`
    },
    {
      dia: 16,
      imagenURL: "",
      poema: `Pel vespre un mirador, unes clares,\nsi et sembla bon pla el motero et portarà.`
    },
    {
      dia: 17,
      imagenURL: "",
      poema: `No ho tinc planejat però...\nsi vols juguem al pilla pilla a la llibreria\n(M'he rigut pensant-ho).`
    },
    {
      dia: 18,
      imagenURL: "",
      poema: `Ja queda poquet jijijij\nPotser no és espectacular el que proposo,\nnomés tinc per oferir la meva companyia.`
    },
    {
      dia: 19,
      imagenURL: "",
      poema: `Tinc ganes de caminar al teu costat.\nAtt: el frikifan`
    },
    {
      dia: 20,
      imagenURL: "",
      poema: `Ets la meva font d'orgull, inspiració,\ngratitud i amor.\nEstaré eternament agraït amb tu.`
    },
    {
      dia: 21,
      imagenURL: "",
      poema: `Que guapa t'imagino amb la rosa a la mà.`
    },
    {
      dia: 22,
      imagenURL: "",
      poema: `Demà és el gran dia!\nEspero que t'hagi agradat el calendari,\nperò demà ve lo bo! T'estimo <3.`
    },
    {
      dia: 23,
      imagenURL: "",
      poema: `Preparat!! Perquè intentaré que sigui\nel dia més especial que recordis en molt temps.`
    }
  ];

  /* ================================================================
     PERSISTENCIA — localStorage
  ================================================================ */
  const STORAGE_KEY = 'santJordi2026_visitats';

  function getDiesVisitats() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch { return []; }
  }

  function marcarVisitat(dia) {
    const v = getDiesVisitats();
    if (!v.includes(dia)) {
      v.push(dia);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(v));
    }
  }

  function estaVisitat(dia) {
    return getDiesVisitats().includes(dia);
  }

  /* ================================================================
     LÒGICA DE DATES
  ================================================================ */
  function esDesblocat(numeroDia) {
    const avui = new Date();
    const any  = avui.getFullYear();
    const mes  = avui.getMonth(); // 0 = gen … 3 = abril
    const dia  = avui.getDate();

    // Únicament s'obre si estem a l'abril de 2026
    // i el dia del mes és igual o superior al número de la casella.
    // Fora d'aquest mes i any: tot bloquejat.
    if (any !== 2026 || mes !== 3) return false;
    return dia >= numeroDia;
  }

  /* ================================================================
     TOAST
  ================================================================ */
  let _toastTimer = null;

  function mostrarToast(text) {
    const el = document.getElementById('toast');
    el.textContent = text;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 4200);
  }

  /* ================================================================
     MODAL
  ================================================================ */
  const modalOverlay = document.getElementById('modal-overlay');
  const modalNumber  = document.getElementById('modal-number');
  const modalImage   = document.getElementById('modal-image');
  const modalPoem    = document.getElementById('modal-poem');
  let   _lastFocused = null;

  function obrirModal(dades) {
    _lastFocused = document.activeElement;
    modalNumber.textContent = dades.dia;
    modalPoem.textContent   = dades.poema;

    if (dades.imagenURL) {
      modalImage.src   = dades.imagenURL;
      modalImage.alt   = `Imatge del dia ${dades.dia}`;
      modalImage.style.display = 'block';
      modalImage.onerror = () => { modalImage.style.display = 'none'; };
    } else {
      modalImage.style.display = 'none';
    }

    modalOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
    setTimeout(() => document.getElementById('modal-close').focus(), 80);
  }

  function tancarModal() {
    modalOverlay.classList.remove('active');
    document.body.style.overflow = '';
    if (_lastFocused) _lastFocused.focus();
  }

  document.getElementById('modal-close').addEventListener('click', tancarModal);
  modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) tancarModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && modalOverlay.classList.contains('active')) tancarModal(); });

  /* ================================================================
     CLIC EN UNA CASELLA
  ================================================================ */
  function clicarCasella(numeroDia) {
    if (!esDesblocat(numeroDia)) {
      mostrarToast(`Aún no es el momento... la rosa florecerá el día ${numeroDia} 🌹`);
      return;
    }

    marcarVisitat(numeroDia);

    const card = document.querySelector(`.card[data-dia="${numeroDia}"]`);
    if (card) {
      card.classList.remove('unlocked');
      card.classList.add('visited');
      const icon  = card.querySelector('.card-icon');
      const label = card.querySelector('.card-label');
      if (icon)  icon.textContent  = (numeroDia === 23) ? '🌹📖🐉' : '🌹';
      if (label) label.textContent = (numeroDia === 23) ? 'Sant Jordi ✦' : 'Llegit';
    }

    const dades = datosCalendario.find(d => d.dia === numeroDia);
    if (dades) obrirModal(dades);
  }

  /* ================================================================
     GENERACIÓ DE LA QUADRÍCULA
  ================================================================ */
  function generarQuadricula() {
    const grid = document.getElementById('calendar-grid');

    datosCalendario.forEach((item, index) => {
      const { dia }   = item;
      const desblocat = esDesblocat(dia);
      const visitat   = estaVisitat(dia);

      let stateClass = 'locked';
      if (desblocat) stateClass = visitat ? 'visited' : 'unlocked';

      let icon = '🔒';
      if (desblocat) {
        if (dia === 23) icon = visitat ? '🌹📖🐉' : '📖🐉';
        else            icon = visitat ? '🌹' : '📖';
      }

      let label = 'Tancat';
      if (desblocat && !visitat) label = (dia === 23) ? 'Sant Jordi ✦' : "Obre'm";
      if (visitat)                label = (dia === 23) ? 'Sant Jordi ✦' : 'Llegit';

      const card = document.createElement('article');
      card.className   = `card ${stateClass}${dia === 23 ? ' day-23' : ''}`;
      card.dataset.dia = dia;
      card.setAttribute('role', 'listitem');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label',
        desblocat
          ? `Dia ${dia} - ${visitat ? 'Ja visitat' : 'Disponible, fes clic per obrir'}`
          : `Dia ${dia} - Bloquejat`
      );

      card.innerHTML = `
        <div class="card-face">
          <span class="card-number">${dia}</span>
          <span class="card-icon" aria-hidden="true">${icon}</span>
          <span class="card-label">${label}</span>
        </div>
      `;

      card.style.animationDelay = `${index * 0.04}s`;

      const handleAction = () => clicarCasella(dia);
      card.addEventListener('click', handleAction);
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleAction(); }
      });

      grid.appendChild(card);
    });
  }

  /* ================================================================
     DATA D'AVUI AL HEADER
  ================================================================ */
  function mostrarDataAvui() {
    const avui   = new Date();
    const opcions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    try {
      document.getElementById('header-date').textContent =
        avui.toLocaleDateString('ca-ES', opcions);
    } catch {
      document.getElementById('header-date').textContent =
        avui.toLocaleDateString(undefined, opcions);
    }
  }

  /* ================================================================
     SURVEY — Lògica de la pregunta prèvia
  ================================================================ */
  (function () {
    const overlay  = document.getElementById('encuesta');
    const pregunta = document.querySelector('.encuesta-pregunta');
    const error    = document.getElementById('encuesta-error');
    const btnSi    = document.getElementById('btn-si');
    const btnNo    = document.getElementById('btn-no');

    function tancarEncuesta() {
      overlay.classList.add('hidden');
      overlay.addEventListener('transitionend', () => {
        overlay.style.display = 'none';
      }, { once: true });
    }

    function mostrarError() {
      // Shake the question
      pregunta.classList.remove('shake');
      void pregunta.offsetWidth; // force reflow to restart animation
      pregunta.classList.add('shake');

      // Show error message
      error.classList.add('visible');
      setTimeout(() => error.classList.remove('visible'), 3000);
    }

    btnSi.addEventListener('click', tancarEncuesta);
    btnNo.addEventListener('click', mostrarError);
  })();

  /* ================================================================
     RESET — visita el link amb ?reset per netejar les visites
  ================================================================ */
  if (new URLSearchParams(window.location.search).has('reset')) {
    localStorage.removeItem(STORAGE_KEY);
    window.location.replace(window.location.pathname);
  }

  /* ================================================================
     INIT
  ================================================================ */
  mostrarDataAvui();
  generarQuadricula();
</script>
</body>
</html>
